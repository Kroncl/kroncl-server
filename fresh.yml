# fresh.yaml
root: .
tmp_dir: tmp
build_name: app
build_path: tmp/main.exe
build_args:
  - -o
  - tmp/main.exe
  - ./cmd/api/main.go
build_delay: 500
binary_name: main.exe
colors: true

build:
  main: cmd/api/main.go
  cmd: go build
  args:
    - -o
    - tmp/main.exe
    - ./cmd/api/main.go

run:
  cmd: tmp/main.exe
  args: []

watch:
  - cmd/**
  - internal/**
  - utils/**
  - *.go

ignore:
  - tmp
  - vendor
  - .git
  - node_modules
  - **/*_test.go

env:
  - GO_ENV=development
  - PORT=8080