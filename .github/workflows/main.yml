name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build Go binary for Linux
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o main cmd/api/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o migrate cmd/migrate/main.go

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.runtime -t kroncl-api:latest .

      - name: Save Docker image to file
        run: |
          docker save kroncl-api:latest | gzip > kroncl-api.tar.gz

      - name: Log in to Docker Hub (опционально)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Copy files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/kroncl"

      - name: Copy Docker image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "kroncl-api.tar.gz"
          target: "/opt/kroncl/"

      - name: Create .env file and deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/kroncl/.env << 'EOF'
            # production / development
            ENV=production
            BASE_DOMAIN=${{ secrets.BASE_DOMAIN }}
            CLIENT_DOMAIN=${{ secrets.CLIENT_DOMAIN }}
            FIRST_ADMIN_EMAIL=${{ secrets.FIRST_ADMIN_EMAIL }}
            ADMIN_KEYWORD=${{ secrets.ADMIN_KEYWORD }}

            # Billing
            BILLING_MODE=${{ secrets.BILLING_MODE }}

            # Api
            HOST=0.0.0.0

            # JWT
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ACCESS_DURATION=24h
            JWT_REFRESH_DURATION=168h
            JWT_RESET_PASSWORD_SECRET_KEY=${{ secrets.JWT_RESET_PASSWORD_SECRET_KEY }}
            JWT_RESET_PASSWORD_DURATION=15m

            # DB
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=kroncl
            DB_USERNAME=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSLMODE=disable

            # Pgadmin
            PGADMIN_EMAIL=admin@admin.com
            PGADMIN_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}

            # Grafana
            GRAFANA_USER=admin
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}

            # MinIO
            MINIO_ROOT_USER=admin
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            MINIO_ENDPOINT=minio:9000
            MINIO_USE_SSL=false
            MINIO_PUBLIC_BUCKET=public
            MINIO_EXTERNAL_HOST=${{ secrets.MINIO_EXTERNAL_HOST }}

            # Unisender Go
            UNISENDER_GO_API_URL=https://goapi.unisender.ru/ru/transactional/api/v1
            UNISENDER_GO_API_KEY=${{ secrets.UNISENDER_GO_API_KEY }}
            UNISENDER_GO_NOTIFY_DOMAIN=notify@kroncl.com

            # Gotenberg
            GOTENBERG_ENDPOINT=http://gotenberg:3000
            GOTENBERG_TEMPLATES_PATH=./templates
            EOF

            chmod 600 /opt/kroncl/.env