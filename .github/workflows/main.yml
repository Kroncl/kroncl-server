name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== 1. Кто мы и где мы? ==="
            whoami
            pwd
            echo "=== 2. Ищем файл docker-compose.yml ==="
            find / -name "docker-compose.yml" 2>/dev/null | head -5
            echo "=== 3. Все контейнеры ==="
            docker ps -a
            echo "=== 4. Папка /opt/kroncl и ее владелец ==="
            ls -ld /opt/kroncl || echo "Папка /opt/kroncl не найдена!"
            ls -la /opt/kroncl/ || echo "Папка пуста или недоступна"

      - name: Copy files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/kroncl"

      - name: Check if files copied successfully
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ls -la /opt/kroncl || echo "Directory /opt/kroncl not found"
            pwd
            whoami

      - name: Create .env file on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/kroncl/.env << 'EOF'
            # production / development
            ENV=production
            BASE_DOMAIN=${{ secrets.BASE_DOMAIN }}
            CLIENT_DOMAIN=${{ secrets.CLIENT_DOMAIN }}
            FIRST_ADMIN_EMAIL=${{ secrets.FIRST_ADMIN_EMAIL }}
            ADMIN_KEYWORD=${{ secrets.ADMIN_KEYWORD }}

            # Billing
            BILLING_MODE=${{ secrets.BILLING_MODE }}

            # Api
            HOST=0.0.0.0

            # JWT
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ACCESS_DURATION=24h
            JWT_REFRESH_DURATION=168h
            JWT_RESET_PASSWORD_SECRET_KEY=${{ secrets.JWT_RESET_PASSWORD_SECRET_KEY }}
            JWT_RESET_PASSWORD_DURATION=15m

            # DB
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=kroncl
            DB_USERNAME=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSLMODE=disable

            # Pgadmin
            PGADMIN_EMAIL=admin@admin.com
            PGADMIN_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}

            # Grafana
            GRAFANA_USER=admin
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}

            # MinIO
            MINIO_ROOT_USER=admin
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            MINIO_ENDPOINT=minio:9000
            MINIO_USE_SSL=false
            MINIO_PUBLIC_BUCKET=public
            MINIO_EXTERNAL_HOST=${{ secrets.MINIO_EXTERNAL_HOST }}

            # Unisender Go
            UNISENDER_GO_API_URL=https://goapi.unisender.ru/ru/transactional/api/v1
            UNISENDER_GO_API_KEY=${{ secrets.UNISENDER_GO_API_KEY }}
            UNISENDER_GO_NOTIFY_DOMAIN=notify@kroncl.com

            # Gotenberg
            GOTENBERG_ENDPOINT=http://gotenberg:3000
            GOTENBERG_TEMPLATES_PATH=./templates
            EOF

            chmod 600 /opt/kroncl/.env

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/kroncl
            docker compose pull
            docker compose up -d --build
            docker image prune -f