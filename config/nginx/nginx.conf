events {
    worker_connections 1024;
}

http {
    # Миниатюры для изображений
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m;

    upstream api {
        server api:8080;
    }

    upstream minio {
        server minio:9000;
    }

    server {
        listen 80;
        server_name ${PUBLIC_HOST};

        # API (все запросы к API идут через /api/)
        location /api/ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Публичные файлы (аватары и т.д.)
        location /files/ {
            proxy_pass http://minio/public/;
            proxy_set_header Host $host;
            
            # Кэширование
            proxy_cache static_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating;
            
            # CORS для фронта
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, immutable, max-age=2592000";
            
            # Если файл не найден в MinIO
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        # Fallback для ненайденных файлов
        location @fallback {
            add_header Cache-Control "no-cache";
            return 404;
        }

        # MinIO Console (админка) - опционально, можно закрыть
        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket поддержка
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Grafana (опционально)
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://api:8080/api/health;
        }

        # Для разработки - перенаправляем корень на API
        location / {
            return 404;
        }
    }
}